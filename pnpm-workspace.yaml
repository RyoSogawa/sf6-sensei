packages:
  - apps/*
  - packages/*

minimumReleaseAge: 10080
# trustPolicy: 過去リリースより信頼根拠（trusted publisher / provenance）が弱くなった版を拒否する。
# publisher 降格・アカウント乗っ取りによる改ざんリリース対策。
trustPolicy: no-downgrade

# trustPolicyExclude: trust-downgrade 検査を免除するパッケージ。除外は調査の上で理由を必ず明記すること。
#   undici-types@6.21.0 — Node.js 公式 undici プロジェクト(github.com/nodejs/undici)の型定義のみ(.d.ts)。
#     6.21.0(2024-11-13 公開)で provenance attestation が外れたが、1 年半以上前の長期安定した変更であり
#     fresh で疑わしい降格ではない。正規メンテナ(Matteo Collina 他)・npm 署名あり・型のみで実行コード注入不可。
#     @types/node が ~6.21.0 固定のため範囲内に代替版なし。供給網リスクは低いと判断して除外。
trustPolicyExclude:
  - "undici-types@6.21.0"

# minimumReleaseAgeExclude: cooldown を免除するパッケージ。原則として使わず空に保つ。
# 若くてブロックされる依存は「成熟版(公開7日以上)へダウングレード」で対応する:
#   - @biomejs/biome 2.4.16 (2.5.0 は若い)
#   - @cloudflare/workers-types 4.20260605.1 (日次リリースのため明示的に成熟版を固定)
#   - esbuild は pnpm overrides で成熟版 0.28.0 に固定（tsx の ~0.28.0 範囲内・若い 0.28.1 を回避）
minimumReleaseAgeExclude: []

# overrides: 若い transitive を成熟版に下げて固定する（除外せずダウングレードで対応）。
# pnpm は range 内の最新を選んでから age チェックで失敗し、自動で成熟版へ下げないため明示固定する。
#   esbuild      — tsx / vitest(vite) が利用。tsx の ~0.28.0 範囲内の成熟版 0.28.0 に固定。
#   @types/node  — vitest の peer(^20||^22||>=24) が latest(25.x 若い)を引くため、Node 22 系の成熟版に固定。
#   obug         — vitest 4.1.8 / astro が利用する debug 代替。2.1.3(2026-06-10 公開)は cooldown 内で
#                  弾かれるため、cooldown 通過済みの成熟版 2.1.2 に固定（astro も 2.1.2 を使用、patch 差）。
#                  2.1.3 が成熟したら除去してよい。
#   hono         — セキュリティ修正版 4.12.25(2026-06-09 公開・成熟)へ全 hono を統一。直接依存は上げたが
#                  @hono/mcp / @modelcontextprotocol/sdk 経由の transitive が 4.12.23 のまま残り audit に出る。
#                  StreamableHTTPTransport は Worker の実行経路に乗るため patch 版へ寄せる(CORS/serve-static/
#                  Lambda の脆弱機能は未使用だが衛生と dedup のため固定)。
overrides:
  esbuild: 0.28.0
  "@types/node": "22.19.20"
  hono: 4.12.25
  obug: 2.1.2

# 依存バージョンの単一ソース
catalog:
  typescript: 6.0.3
  vitest: 4.1.8

# allowBuilds: pnpm 11 は lifecycle script の実行可否を明示必須にした（pnpm 10 は既定で全保留）。
# 元の挙動（全保留＝未承認）を維持するため全て false で明示的に拒否する。esbuild/lefthook/sharp/workerd は
# いずれも prebuilt バイナリを optional dep で同梱するため script 不要で dev は機能する。
# デプロイ（wrangler）で workerd の build が要るときは、その時に workerd を true へ（docs/deploy.md）。
allowBuilds:
  esbuild: false
  lefthook: false
  sharp: false
  workerd: false
