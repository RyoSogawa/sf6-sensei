# Worktree Plus Configuration
version: "1.0"

# Default settings for worktrees
defaults:
  # Base directory for worktrees (relative to repository root)
  base_dir: .claude/worktrees

# Hooks that run after creating a worktree
hooks:
  post_create:
    # gitignored ファイルをメイン worktree から新 worktree へコピー。
    # 'from' はメイン worktree 基準、'to' は新 worktree 基準。
    # コピー元が無いときは警告が出るが worktree 作成は続行する。
    - type: copy
      from: .env
      to: .env
    - type: copy
      from: .claude/settings.local.json
      to: .claude/settings.local.json

    # 作成した worktree 一覧を表示
    - type: command
      command: wtp list
